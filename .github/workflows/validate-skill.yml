name: Validate Agent Skill

on:
  # Intentionally no paths filter: .githooks and any otherwise-unlisted text
  # file can carry a secret/PII and must still trigger the repository scan.
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate all skills
        run: |
          set -euo pipefail
          python3 -c 'import json; print("\n".join(p.removeprefix("./") for p in json.load(open(".claude-plugin/plugin.json"))["skills"]))' |
          while read -r skill; do
            bash scripts/validate-skill.sh "$skill"
          done
          bash scripts/validate-skill.sh --status

      - name: Architecture and distribution contracts
        run: |
          set -euo pipefail
          python3 scripts/check-architecture.py
          python3 scripts/generate-system-docs.py --check
          python3 scripts/generate-auditor-runtime.py --check
          python3 -m unittest tests.test_architecture tests.test_distribution_builder
          bash tests/test_runtime_distribution.sh

      - name: Root references/ blob-main guard
        run: |
          # Repo-level half of the documented blob/main ban: the per-skill validator
          # scans each skill's SKILL.md + references/, but cannot see root references/.
          # `!` must stay the last command — under bash -e an inverted failure does not
          # abort the script, so a trailing echo would mask a hit.
          ! grep -rn "blob/main" references/ --include="*.md"

      - name: Lint connector code (py_compile)
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/*.py scripts/connectors/*.py
          echo "all Python helpers compile clean"

      - name: Deterministic behavior conformance
        run: python3 scripts/run-behavior-evals.py

      - name: Eval-fixture and routing structural lint
        run: python3 scripts/check-evals.py

      - name: PII / secret scan
        # Read every tracked blob from the index so hidden directories, symlinks,
        # and filesystem-walk exclusions cannot bypass the release gate.
        run: python3 scripts/check-pii.py --tracked

      - name: Dependency-creep guard (stdlib-only)
        run: bash scripts/check-stdlib-only.sh

      - name: Version-sync guard (10 tracking surfaces)
        run: bash scripts/check-versions.sh

      - name: Cross-agent discovery guard (npx skills)
        run: |
          set -euo pipefail
          # End-to-end guard for the 70+ SKILL.md hosts served by `npx skills`
          # (see docs/agent-compatibility.md): the installer must discover every
          # skill declared in plugin.json. Catches invalid frontmatter YAML and
          # manifest drift in one shot — a skill the installer cannot see is a
          # skill no non-Claude host can install.
          declared=$(python3 -c "import json; print(len(json.load(open('.claude-plugin/plugin.json'))['skills']))")
          found=$(npx -y skills add . --list 2>&1 | sed 's/\x1b\[[0-9;]*m//g' | grep -oE 'Found [0-9]+ skill' | grep -oE '[0-9]+' | head -1 || true)
          echo "declared=$declared found=${found:-none}"
          [ "${found:-0}" = "$declared" ]

      - name: Local Markdown link targets
        run: python3 scripts/check-local-links.py

      - name: Validate JSON and shell syntax
        run: |
          set -euo pipefail
          find . -path ./.git -prune -o -path ./.planning -prune -o -name '*.json' -type f -print0 |
            xargs -0 -n1 python3 -m json.tool >/dev/null
          # runtime and Git hook scripts must parse
          bash -n hooks/claude-hook.sh .githooks/pre-commit && echo "hook scripts parse"
          python3 -c "import json; json.load(open('hooks/hooks.json')); print('ok: hooks/hooks.json')"
